name: Continuous Delivery

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Build and Deploy

    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
      SHA_SHORT: ${{ github.sha }}

    steps:
      # -----------------------------------
      # Checkout
      # -----------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------
      # Generate short SHA
      # -----------------------------------

      - name: Generate short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # -----------------------------------
      # Docker Hub Login
      # -----------------------------------

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------
      # Build & Push Vote
      # -----------------------------------

      - name: Build vote image
        run: |
          docker build \
            -t fatemehparmoo/vote:latest \
            -t fatemehparmoo/vote:${{ steps.vars.outputs.sha_short }} \
            ./services/vote

      - name: Push vote image
        run: |
          docker push fatemehparmoo/vote:latest
          docker push fatemehparmoo/vote:${{ steps.vars.outputs.sha_short }}

      # -----------------------------------
      # Build & Push Result
      # -----------------------------------

      - name: Build result image
        run: |
          docker build \
            -t fatemehparmoo/result:latest \
            -t fatemehparmoo/result:${{ steps.vars.outputs.sha_short }} \
            ./services/result

      - name: Push result image
        run: |
          docker push fatemehparmoo/result:latest
          docker push fatemehparmoo/result:${{ steps.vars.outputs.sha_short }}

      # -----------------------------------
      # Build & Push Worker
      # -----------------------------------

      - name: Build worker image
        run: |
          docker build \
            -t fatemehparmoo/worker:latest \
            -t fatemehparmoo/worker:${{ steps.vars.outputs.sha_short }} \
            ./services/worker

      - name: Push worker image
        run: |
          docker push fatemehparmoo/worker:latest
          docker push fatemehparmoo/worker:${{ steps.vars.outputs.sha_short }}

      # -----------------------------------
      # Configure kubectl
      # -----------------------------------

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Verify cluster access
        run: |
          kubectl get nodes

      # -----------------------------------
      # Create / Update Secret
      # -----------------------------------

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic app-secret \
            --from-literal=DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -n $ENVIRONMENT \
            --dry-run=client -o yaml | kubectl apply -f -

      # -----------------------------------
      # Deploy overlay
      # -----------------------------------

      - name: Deploy overlay
        run: |
          kubectl apply -k k8s/overlays/$ENVIRONMENT

      # -----------------------------------
      # Restart deployments
      # -----------------------------------

      - name: Restart deployments
        run: |
          kubectl rollout restart deployment/vote-deployment -n $ENVIRONMENT
          kubectl rollout restart deployment/result-deployment -n $ENVIRONMENT
          kubectl rollout restart deployment/worker-deployment -n $ENVIRONMENT

      # -----------------------------------
      # Verify rollout
      # -----------------------------------

      - name: Verify vote rollout
        run: |
          kubectl rollout status deployment/vote-deployment -n $ENVIRONMENT

      - name: Verify result rollout
        run: |
          kubectl rollout status deployment/result-deployment -n $ENVIRONMENT

      - name: Verify worker rollout
        run: |
          kubectl rollout status deployment/worker-deployment -n $ENVIRONMENT