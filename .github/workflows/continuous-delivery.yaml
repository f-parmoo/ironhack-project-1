name: Continuous Delivery

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate short SHA
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Print deployment target
        run: |
          echo "Deploying to: $ENVIRONMENT"
          echo "Image tag: ${{ steps.vars.outputs.sha_short }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push vote image
        run: |
          docker build \
            -t fatemehparmoo/vote:${{ steps.vars.outputs.sha_short }} \
            ./services/vote

          docker push fatemehparmoo/vote:${{ steps.vars.outputs.sha_short }}

      - name: Build and push result image
        run: |
          docker build \
            -t fatemehparmoo/result:${{ steps.vars.outputs.sha_short }} \
            ./services/result

          docker push fatemehparmoo/result:${{ steps.vars.outputs.sha_short }}

      - name: Build and push worker image
        run: |
          docker build \
            -t fatemehparmoo/worker:${{ steps.vars.outputs.sha_short }} \
            ./services/worker

          docker push fatemehparmoo/worker:${{ steps.vars.outputs.sha_short }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config

      - name: Verify cluster access
        run: |
          kubectl get nodes

      - name: Create namespace
        run: |
          kubectl create namespace $ENVIRONMENT \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic app-secret \
            --from-literal=DB_USERNAME="${{ secrets.DB_USERNAME }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -n $ENVIRONMENT \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Update image tags in Kustomize overlay
        run: |
          cd k8s/overlays/$ENVIRONMENT

          kustomize edit set image fatemehparmoo/vote=fatemehparmoo/vote:${{ steps.vars.outputs.sha_short }}
          kustomize edit set image fatemehparmoo/result=fatemehparmoo/result:${{ steps.vars.outputs.sha_short }}
          kustomize edit set image fatemehparmoo/worker=fatemehparmoo/worker:${{ steps.vars.outputs.sha_short }}

      - name: Deploy overlay
        run: |
          kubectl apply -k k8s/overlays/$ENVIRONMENT

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/vote-deployment -n $ENVIRONMENT
          kubectl rollout status deployment/result-deployment -n $ENVIRONMENT
          kubectl rollout status deployment/worker-deployment -n $ENVIRONMENT