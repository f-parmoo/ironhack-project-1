- name: Install Docker on backend servers
  hosts: all # dynamic target via CLI inventory
  become: yes

  vars:
    docker_apt_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable"

  tasks:
    - name: Install dependencies
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker repository
      apt_repository:
        repo: "{{ docker_apt_repo }}"
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

- name: Deploy backend containers
  hosts: backend # dynamic target via CLI inventory
  become: yes
  tasks:
    - name: Pull worker image
      shell: docker pull fatemehparmoo/worker:latest

    - name: Create backend docker network
      shell: docker network create backend-net || true

    - name: Run Redis
      shell: |
        docker rm -f redis || true
        docker pull redis:alpine
        docker run -d \
          --name redis \
          --network backend-net \
          -p 6379:6379 \
          redis:alpine

    - name: Wait for Redis
      shell: |
        until docker exec redis redis-cli ping | grep PONG; do
          sleep 5
        done

    - name: Run worker
      shell: |
        docker rm -f worker || true
        docker run -d \
          --name worker \
          --network backend-net \
          -e DB_HOST={{ aurora_endpoint }} \
          -e DB_USERNAME=postgres \
          -e DB_PASSWORD=postgres \
          -e DB_NAME=postgres \
          -e REDIS_HOST=redis \
          fatemehparmoo/worker:latest
