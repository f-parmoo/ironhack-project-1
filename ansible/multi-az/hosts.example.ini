[bastion]
bastion-ec2 ansible_host=<BASTION_PUBLIC_DNS_OR_IP>

[frontend]
frontend-ec2-1 ansible_host=<FRONTEND_PRIVATE_IP_1>
frontend-ec2-2 ansible_host=<FRONTEND_PRIVATE_IP_2>

[backend]
backend-ec2-1 ansible_host=<BACKEND_PRIVATE_IP_1>
backend-ec2-2 ansible_host=<BACKEND_PRIVATE_IP_2>

[private:children]
frontend
backend

[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=../../keys/voting-project-key.pem
ansible_python_interpreter=/usr/bin/python3

[private:vars]
ansible_ssh_common_args='-o ProxyJump=ubuntu@<BASTION_PUBLIC_DNS_OR_IP>'