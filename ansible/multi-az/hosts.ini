[all:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=../../keys/voting-project-key.pem 
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

[private:vars]
ansible_ssh_common_args=-o ProxyJump=ubuntu@ec2-44-203-214-30.compute-1.amazonaws.com -o IdentityFile=../../keys/voting-project-key.pem  -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null