[bastion]
bastion-ec2 ansible_host=ec2-44-203-214-30.compute-1.amazonaws.com

[frontend]
frontend-ec2-1 ansible_host=10.30.10.47
frontend-ec2-2 ansible_host=10.30.20.66

[backend]
backend-ec2-1 ansible_host=10.30.10.64
backend-ec2-2 ansible_host=10.30.20.197

[private:children]
frontend
