apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: result
  template:
    metadata:
      labels:
        app: result
    spec:
      containers:
      - name: result-container
        image: fatemehparmoo/result:latest
        ports:
        - containerPort: 80
        env:
        - name: PORT
          value: "80"

        - name: PG_HOST
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PG_HOST

        - name: PG_USER
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PG_USER

        - name: PG_DATABASE
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PG_DATABASE

        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: PG_PASSWORD

        - name: PG_PORT
          value: "5432"

---
apiVersion: v1
kind: Service
metadata:
  name: result-service
spec:
  selector:
    app: result
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP