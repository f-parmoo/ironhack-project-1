# Ironhack note - This file is for running in docker compose with prebuilt images
# Use these if you're stuck, or if you want to start slowly migrating from external images into your own.

services:
  vote:
    image: fatemehparmoo/vote:latest
    build: ./services/vote
    platform: linux/amd64

    depends_on:
      redis:
        condition: service_healthy 
    ports:
      - "8080:80"
    networks:
      - back-tier

  result:
    image: fatemehparmoo/result:latest
    build: ./services/result
    platform: linux/amd64
    depends_on:
      db:
        condition: service_healthy 
    ports:
      - "8081:80"
    networks:
      - back-tier

  worker:
    build: ./services/worker
    image: fatemehparmoo/worker:latest
    platform: linux/amd64
    depends_on:
      redis:
        condition: service_healthy 
      db:
        condition: service_healthy 
    networks:
      - back-tier

  redis:
    image: redis:alpine
    volumes:
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/redis.sh
      interval: "5s"
    networks:
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - "db-data:/var/lib/postgresql/data"
      - "./healthchecks:/healthchecks"
    healthcheck:
      test: /healthchecks/postgres.sh
      interval: "5s"
    networks:
      - back-tier

volumes:
  db-data:

networks:
  back-tier:
